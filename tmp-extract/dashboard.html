<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shotbase — Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  :root {
    --bg: #050505; --bg-1: #0a0a0a; --bg-2: #111; --bg-3: #1a1a1a;
    --border: rgba(255,255,255,0.07); --text: #f0f0f0; --text-2: #888; --text-3: #444;
    --green: #00e87b; --green-dim: rgba(0,232,123,0.1); --green-glow: rgba(0,232,123,0.35);
    --mono: 'IBM Plex Mono', monospace; --sans: 'Inter', sans-serif;
    --sidebar-w: 220px;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: var(--sans); font-size: 14px; line-height: 1.5; -webkit-font-smoothing: antialiased; display: flex; min-height: 100vh; }
  body::before {
    content: ''; position: fixed; inset: 0;
    background-image: linear-gradient(rgba(255,255,255,0.012) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.012) 1px, transparent 1px);
    background-size: 60px 60px; pointer-events: none; z-index: 0;
  }
</style>
</head>
<body>
<div id="root" style="display:flex;width:100%;position:relative;z-index:1;"></div>
<script type="text/babel">
const { useState, useEffect } = React;

// ─── Data ───────────────────────────────────────────────────────────────────
const LOGS = [
  { id: 'req_9xkp2', url: 'https://stripe.com', status: 200, ms: 142, format: 'png', cached: true, ts: '2m ago', size: '284 KB' },
  { id: 'req_8qmn1', url: 'https://vercel.com/dashboard', status: 200, ms: 891, format: 'png', cached: false, ts: '7m ago', size: '512 KB' },
  { id: 'req_7xlt3', url: 'https://linear.app', status: 200, ms: 178, format: 'jpeg', cached: true, ts: '12m ago', size: '198 KB' },
  { id: 'req_6bnq9', url: 'https://github.com/torvalds/linux', status: 200, ms: 1240, format: 'pdf', cached: false, ts: '18m ago', size: '1.1 MB' },
  { id: 'req_5pxk2', url: 'https://news.ycombinator.com', status: 200, ms: 201, format: 'png', cached: false, ts: '31m ago', size: '88 KB' },
  { id: 'req_4mnb7', url: 'https://figma.com', status: 429, ms: 0, format: 'png', cached: false, ts: '44m ago', size: '—' },
  { id: 'req_3xqp1', url: 'https://openai.com', status: 200, ms: 334, format: 'png', cached: false, ts: '1h ago', size: '421 KB' },
  { id: 'req_2kln5', url: 'https://tailwindcss.com/docs', status: 200, ms: 155, format: 'png', cached: true, ts: '2h ago', size: '310 KB' },
];

const KEYS = [
  { id: 'key_prod_9xkp', name: 'Production', key: 'sk-live-9xkp2q8mnt3rLp...', created: 'Apr 12, 2026', last: '2m ago', requests: 4821, active: true },
  { id: 'key_dev_3mnb', name: 'Development', key: 'sk-live-3mnb7qxp2k8rNt...', created: 'Mar 28, 2026', last: '2d ago', requests: 213, active: true },
  { id: 'key_test_1xqp', name: 'Test (revoked)', key: 'sk-live-1xqp5kln2m8rBv...', created: 'Jan 5, 2026', last: '—', requests: 88, active: false },
];

const CHART_DATA = [12,28,19,44,61,38,72,55,90,78,103,88,120,98,134,115,142,128,160,145,172,158,188,174];

// ─── Shared styles ───────────────────────────────────────────────────────────
const S = {
  sidebar: { width: 220, minHeight: '100vh', background: 'var(--bg-1)', borderRight: '1px solid var(--border)', display: 'flex', flexDirection: 'column', flexShrink: 0 },
  main: { flex: 1, display: 'flex', flexDirection: 'column', minWidth: 0 },
  topbar: { height: 56, borderBottom: '1px solid var(--border)', display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '0 28px', flexShrink: 0, background: 'rgba(5,5,5,0.7)', backdropFilter: 'blur(10px)', position: 'sticky', top: 0, zIndex: 10 },
  content: { flex: 1, padding: '32px 28px', overflow: 'auto' },
  card: { background: 'var(--bg-1)', border: '1px solid var(--border)', borderRadius: 10, padding: 24 },
  metricCard: { background: 'var(--bg-1)', border: '1px solid var(--border)', borderRadius: 10, padding: '20px 24px' },
  tag: (color) => ({ display: 'inline-flex', alignItems: 'center', fontFamily: 'var(--mono)', fontSize: 11, padding: '2px 8px', borderRadius: 4, background: color === 'green' ? 'var(--green-dim)' : color === 'red' ? 'rgba(255,60,60,0.1)' : 'rgba(255,255,255,0.05)', color: color === 'green' ? 'var(--green)' : color === 'red' ? '#ff6060' : 'var(--text-2)', border: `1px solid ${color === 'green' ? 'rgba(0,232,123,0.2)' : color === 'red' ? 'rgba(255,60,60,0.2)' : 'var(--border)'}` }),
};

// ─── Components ──────────────────────────────────────────────────────────────
function Logo() {
  return (
    <div style={{ display: 'flex', alignItems: 'center', gap: 10, padding: '20px 20px 16px' }}>
      <div style={{ width: 26, height: 26, background: 'var(--green)', borderRadius: 6, display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 }}>
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
          <rect x="1" y="1" width="14" height="10" rx="2" stroke="#000" strokeWidth="1.5"/>
          <path d="M4 14h8M8 11v3" stroke="#000" strokeWidth="1.5" strokeLinecap="round"/>
        </svg>
      </div>
      <span style={{ fontFamily: 'var(--mono)', fontWeight: 600, fontSize: 14, color: 'var(--text)' }}>shotbase</span>
    </div>
  );
}

function NavItem({ icon, label, active, onClick, badge }) {
  return (
    <button onClick={onClick} style={{ display: 'flex', alignItems: 'center', gap: 10, width: '100%', padding: '9px 16px', background: active ? 'rgba(0,232,123,0.08)' : 'none', border: 'none', borderRadius: 7, cursor: 'pointer', color: active ? 'var(--green)' : 'var(--text-2)', fontFamily: 'var(--sans)', fontSize: 13, fontWeight: active ? 500 : 400, textAlign: 'left', transition: 'all 0.15s', marginBottom: 2 }}
      onMouseEnter={e => { if (!active) { e.currentTarget.style.background = 'rgba(255,255,255,0.04)'; e.currentTarget.style.color = 'var(--text)'; }}}
      onMouseLeave={e => { if (!active) { e.currentTarget.style.background = 'none'; e.currentTarget.style.color = 'var(--text-2)'; }}}>
      <span style={{ opacity: active ? 1 : 0.6 }}>{icon}</span>
      {label}
      {badge && <span style={{ marginLeft: 'auto', fontFamily: 'var(--mono)', fontSize: 10, background: 'var(--green)', color: '#000', padding: '1px 6px', borderRadius: 10, fontWeight: 600 }}>{badge}</span>}
    </button>
  );
}

function MiniChart() {
  const max = Math.max(...CHART_DATA);
  const w = 480, h = 80;
  const pts = CHART_DATA.map((v, i) => {
    const x = (i / (CHART_DATA.length - 1)) * w;
    const y = h - (v / max) * (h - 8);
    return `${x},${y}`;
  }).join(' ');
  const area = `0,${h} ${pts} ${w},${h}`;
  return (
    <svg viewBox={`0 0 ${w} ${h}`} style={{ width: '100%', height: 80 }} preserveAspectRatio="none">
      <defs>
        <linearGradient id="cg" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor="#00e87b" stopOpacity="0.25"/>
          <stop offset="100%" stopColor="#00e87b" stopOpacity="0"/>
        </linearGradient>
      </defs>
      <polygon points={area} fill="url(#cg)"/>
      <polyline points={pts} fill="none" stroke="#00e87b" strokeWidth="1.5" strokeLinejoin="round"/>
    </svg>
  );
}

// ─── Pages ───────────────────────────────────────────────────────────────────
function OverviewPage() {
  const metrics = [
    { label: 'Screenshots this month', value: '4,821', delta: '+12%', sub: '500 free · 4,321 paid' },
    { label: 'Avg response time', value: '187ms', delta: '−23ms', sub: 'vs last 30 days' },
    { label: 'Cache hit rate', value: '64%', delta: '+8%', sub: 'sub-200ms served' },
    { label: 'Success rate', value: '99.4%', delta: 'stable', sub: '28 errors this month' },
  ];

  return (
    <div>
      <h1 style={{ fontSize: 20, fontWeight: 600, letterSpacing: '-0.02em', marginBottom: 6 }}>Overview</h1>
      <p style={{ color: 'var(--text-2)', fontSize: 13, marginBottom: 28 }}>April 2026 · Pro plan · Route1AI workspace</p>

      {/* Metric cards */}
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: 12, marginBottom: 24 }}>
        {metrics.map((m, i) => (
          <div key={i} style={S.metricCard}>
            <div style={{ fontFamily: 'var(--mono)', fontSize: 11, color: 'var(--text-3)', textTransform: 'uppercase', letterSpacing: '0.08em', marginBottom: 10 }}>{m.label}</div>
            <div style={{ display: 'flex', alignItems: 'baseline', gap: 10, marginBottom: 6 }}>
              <span style={{ fontSize: 28, fontWeight: 700, letterSpacing: '-0.03em' }}>{m.value}</span>
              <span style={{ fontFamily: 'var(--mono)', fontSize: 11, color: m.delta.startsWith('+') || m.delta.startsWith('−') && m.delta.includes('ms') ? (m.delta.startsWith('+') ? 'var(--green)' : '#ff9060') : m.delta === 'stable' ? 'var(--text-3)' : 'var(--green)' }}>{m.delta}</span>
            </div>
            <div style={{ fontFamily: 'var(--mono)', fontSize: 11, color: 'var(--text-3)' }}>{m.sub}</div>
          </div>
        ))}
      </div>

      {/* Chart */}
      <div style={{ ...S.card, marginBottom: 24 }}>
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 20 }}>
          <div>
            <div style={{ fontWeight: 500, fontSize: 14, marginBottom: 2 }}>Request volume</div>
            <div style={{ fontFamily: 'var(--mono)', fontSize: 11, color: 'var(--text-3)' }}>Last 24 hours · hourly</div>
          </div>
          <div style={{ display: 'flex', gap: 8 }}>
            {['24h', '7d', '30d'].map(t => (
              <button key={t} style={{ fontFamily: 'var(--mono)', fontSize: 11, padding: '5px 10px', background: t === '24h' ? 'var(--green-dim)' : 'none', border: `1px solid ${t === '24h' ? 'rgba(0,232,123,0.2)' : 'var(--border)'}`, borderRadius: 6, color: t === '24h' ? 'var(--green)' : 'var(--text-3)', cursor: 'pointer' }}>{t}</button>
            ))}
          </div>
        </div>
        <MiniChart/>
        <div style={{ display: 'flex', justifyContent: 'space-between', fontFamily: 'var(--mono)', fontSize: 10, color: 'var(--text-3)', marginTop: 8 }}>
          {['00:00','04:00','08:00','12:00','16:00','20:00','Now'].map(t => <span key={t}>{t}</span>)}
        </div>
      </div>

      {/* Recent logs */}
      <div style={S.card}>
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 16 }}>
          <div style={{ fontWeight: 500, fontSize: 14 }}>Recent requests</div>
          <button onClick={() => {}} style={{ fontFamily: 'var(--mono)', fontSize: 12, color: 'var(--green)', background: 'none', border: 'none', cursor: 'pointer' }}>View all →</button>
        </div>
        <LogTable rows={LOGS.slice(0, 5)} />
      </div>
    </div>
  );
}

function LogTable({ rows, filter = '' }) {
  const filtered = filter ? rows.filter(r => r.url.includes(filter) || r.id.includes(filter) || String(r.status).includes(filter)) : rows;
  return (
    <table style={{ width: '100%', borderCollapse: 'collapse' }}>
      <thead>
        <tr style={{ borderBottom: '1px solid var(--border)' }}>
          {['Request ID', 'URL', 'Status', 'Time', 'Format', 'Size', 'When'].map(h => (
            <th key={h} style={{ fontFamily: 'var(--mono)', fontSize: 10, textTransform: 'uppercase', letterSpacing: '0.08em', color: 'var(--text-3)', fontWeight: 500, textAlign: 'left', padding: '0 0 10px', paddingRight: 16 }}>{h}</th>
          ))}
        </tr>
      </thead>
      <tbody>
        {filtered.map((r, i) => (
          <tr key={r.id} style={{ borderBottom: i < filtered.length - 1 ? '1px solid var(--border)' : 'none' }}
            onMouseEnter={e => e.currentTarget.style.background = 'rgba(255,255,255,0.02)'}
            onMouseLeave={e => e.currentTarget.style.background = 'none'}>
            <td style={{ fontFamily: 'var(--mono)', fontSize: 11, color: 'var(--green)', padding: '11px 16px 11px 0', whiteSpace: 'nowrap' }}>{r.id}</td>
            <td style={{ fontFamily: 'var(--mono)', fontSize: 11, color: 'var(--text-2)', padding: '11px 16px 11px 0', maxWidth: 260, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{r.url}</td>
            <td style={{ padding: '11px 16px 11px 0' }}>
              <span style={S.tag(r.status === 200 ? 'green' : 'red')}>{r.status}</span>
            </td>
            <td style={{ fontFamily: 'var(--mono)', fontSize: 11, color: 'var(--text-2)', padding: '11px 16px 11px 0', whiteSpace: 'nowrap' }}>{r.ms ? `${r.ms}ms` : '—'}</td>
            <td style={{ padding: '11px 16px 11px 0' }}>
              <span style={S.tag('default')}>{r.format}</span>
            </td>
            <td style={{ fontFamily: 'var(--mono)', fontSize: 11, color: 'var(--text-2)', padding: '11px 16px 11px 0' }}>{r.size}</td>
            <td style={{ fontFamily: 'var(--mono)', fontSize: 11, color: 'var(--text-3)', padding: '11px 0 11px 0', whiteSpace: 'nowrap' }}>{r.ts}</td>
          </tr>
        ))}
      </tbody>
    </table>
  );
}

function ApiKeysPage() {
  const [showNew, setShowNew] = useState(false);
  const [newName, setNewName] = useState('');
  const [keys, setKeys] = useState(KEYS);
  const [revealed, setRevealed] = useState({});
  const [revoking, setRevoking] = useState(null);

  const createKey = () => {
    if (!newName.trim()) return;
    const newKey = { id: `key_new_${Date.now()}`, name: newName, key: `sk-live-${Math.random().toString(36).slice(2, 10)}...`, created: 'Apr 23, 2026', last: 'Never', requests: 0, active: true };
    setKeys([newKey, ...keys]);
    setShowNew(false);
    setNewName('');
  };

  const revokeKey = (id) => {
    setRevoking(id);
    setTimeout(() => {
      setKeys(ks => ks.map(k => k.id === id ? { ...k, active: false, name: k.name + ' (revoked)' } : k));
      setRevoking(null);
    }, 800);
  };

  return (
    <div>
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: 28 }}>
        <div>
          <h1 style={{ fontSize: 20, fontWeight: 600, letterSpacing: '-0.02em', marginBottom: 6 }}>API Keys</h1>
          <p style={{ color: 'var(--text-2)', fontSize: 13 }}>Manage your API keys. Keep them secret — treat like passwords.</p>
        </div>
        <button onClick={() => setShowNew(true)} style={{ fontFamily: 'var(--mono)', fontSize: 12, fontWeight: 600, color: '#000', background: 'var(--green)', border: 'none', padding: '9px 18px', borderRadius: 7, cursor: 'pointer' }}>+ Create key</button>
      </div>

      {showNew && (
        <div style={{ ...S.card, marginBottom: 16, border: '1px solid rgba(0,232,123,0.2)' }}>
          <div style={{ fontWeight: 500, fontSize: 14, marginBottom: 16 }}>New API key</div>
          <div style={{ display: 'flex', gap: 10 }}>
            <input value={newName} onChange={e => setNewName(e.target.value)} placeholder="Key name (e.g. Production)" onKeyDown={e => e.key === 'Enter' && createKey()}
              style={{ flex: 1, fontFamily: 'var(--mono)', fontSize: 13, background: 'var(--bg-2)', border: '1px solid var(--border)', borderRadius: 7, padding: '9px 14px', color: 'var(--text)', outline: 'none' }}/>
            <button onClick={createKey} style={{ fontFamily: 'var(--mono)', fontSize: 12, fontWeight: 600, color: '#000', background: 'var(--green)', border: 'none', padding: '9px 18px', borderRadius: 7, cursor: 'pointer' }}>Create</button>
            <button onClick={() => setShowNew(false)} style={{ fontFamily: 'var(--mono)', fontSize: 12, color: 'var(--text-2)', background: 'none', border: '1px solid var(--border)', padding: '9px 14px', borderRadius: 7, cursor: 'pointer' }}>Cancel</button>
          </div>
        </div>
      )}

      <div style={S.card}>
        <table style={{ width: '100%', borderCollapse: 'collapse' }}>
          <thead>
            <tr style={{ borderBottom: '1px solid var(--border)' }}>
              {['Name', 'Key', 'Created', 'Last used', 'Requests', ''].map(h => (
                <th key={h} style={{ fontFamily: 'var(--mono)', fontSize: 10, textTransform: 'uppercase', letterSpacing: '0.08em', color: 'var(--text-3)', fontWeight: 500, textAlign: 'left', padding: '0 0 12px', paddingRight: 16 }}>{h}</th>
              ))}
            </tr>
          </thead>
          <tbody>
            {keys.map((k, i) => (
              <tr key={k.id} style={{ borderBottom: i < keys.length - 1 ? '1px solid var(--border)' : 'none', opacity: k.active ? 1 : 0.4 }}>
                <td style={{ padding: '14px 16px 14px 0' }}>
                  <div style={{ fontWeight: 500, fontSize: 13 }}>{k.name}</div>
                </td>
                <td style={{ padding: '14px 16px 14px 0' }}>
                  <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                    <code style={{ fontFamily: 'var(--mono)', fontSize: 12, color: 'var(--text-2)' }}>{revealed[k.id] ? k.key.replace('...', 'xxxxxxxx') : k.key}</code>
                    {k.active && <button onClick={() => setRevealed(r => ({ ...r, [k.id]: !r[k.id] }))} style={{ fontFamily: 'var(--mono)', fontSize: 10, color: 'var(--text-3)', background: 'none', border: 'none', cursor: 'pointer', padding: 0 }}>{revealed[k.id] ? 'hide' : 'show'}</button>}
                  </div>
                </td>
                <td style={{ fontFamily: 'var(--mono)', fontSize: 12, color: 'var(--text-2)', padding: '14px 16px 14px 0', whiteSpace: 'nowrap' }}>{k.created}</td>
                <td style={{ fontFamily: 'var(--mono)', fontSize: 12, color: 'var(--text-2)', padding: '14px 16px 14px 0', whiteSpace: 'nowrap' }}>{k.last}</td>
                <td style={{ fontFamily: 'var(--mono)', fontSize: 12, color: 'var(--text-2)', padding: '14px 16px 14px 0' }}>{k.requests.toLocaleString()}</td>
                <td style={{ padding: '14px 0', textAlign: 'right' }}>
                  {k.active && (
                    <button onClick={() => revokeKey(k.id)} style={{ fontFamily: 'var(--mono)', fontSize: 11, color: revoking === k.id ? 'var(--text-3)' : '#ff6060', background: 'none', border: '1px solid', borderColor: revoking === k.id ? 'var(--border)' : 'rgba(255,60,60,0.2)', padding: '5px 12px', borderRadius: 6, cursor: 'pointer', transition: 'all 0.15s' }}>{revoking === k.id ? 'Revoking…' : 'Revoke'}</button>
                  )}
                </td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>

      <div style={{ marginTop: 16, fontFamily: 'var(--mono)', fontSize: 11, color: 'var(--text-3)', lineHeight: 1.7 }}>
        <span style={{ color: 'var(--green)' }}>→</span> Secret keys are shown once. Store them securely — we cannot recover them.<br/>
        <span style={{ color: 'var(--green)' }}>→</span> Revoking a key immediately invalidates all requests using it.
      </div>
    </div>
  );
}

function LogsPage() {
  const [filter, setFilter] = useState('');
  const [statusFilter, setStatusFilter] = useState('all');
  const filtered = LOGS.filter(r => {
    const matchStatus = statusFilter === 'all' || (statusFilter === 'ok' && r.status === 200) || (statusFilter === 'err' && r.status !== 200);
    const matchText = !filter || r.url.includes(filter) || r.id.includes(filter);
    return matchStatus && matchText;
  });

  return (
    <div>
      <h1 style={{ fontSize: 20, fontWeight: 600, letterSpacing: '-0.02em', marginBottom: 6 }}>Request Logs</h1>
      <p style={{ color: 'var(--text-2)', fontSize: 13, marginBottom: 24 }}>Real-time request history. 30-day retention on Pro plan.</p>

      <div style={{ display: 'flex', gap: 10, marginBottom: 20 }}>
        <input value={filter} onChange={e => setFilter(e.target.value)} placeholder="Filter by URL or request ID…"
          style={{ flex: 1, fontFamily: 'var(--mono)', fontSize: 12, background: 'var(--bg-1)', border: '1px solid var(--border)', borderRadius: 7, padding: '9px 14px', color: 'var(--text)', outline: 'none' }}/>
        {['all', 'ok', 'err'].map(s => (
          <button key={s} onClick={() => setStatusFilter(s)} style={{ fontFamily: 'var(--mono)', fontSize: 11, padding: '8px 14px', background: statusFilter === s ? 'var(--green-dim)' : 'var(--bg-1)', border: `1px solid ${statusFilter === s ? 'rgba(0,232,123,0.2)' : 'var(--border)'}`, borderRadius: 7, color: statusFilter === s ? 'var(--green)' : 'var(--text-2)', cursor: 'pointer' }}>
            {s === 'all' ? 'All' : s === 'ok' ? '2xx' : 'Errors'}
          </button>
        ))}
        <button style={{ fontFamily: 'var(--mono)', fontSize: 11, padding: '8px 14px', background: 'var(--bg-1)', border: '1px solid var(--border)', borderRadius: 7, color: 'var(--text-2)', cursor: 'pointer' }}>↓ Export</button>
      </div>

      <div style={S.card}>
        <LogTable rows={filtered} />
        {filtered.length === 0 && <div style={{ textAlign: 'center', padding: '40px 0', fontFamily: 'var(--mono)', fontSize: 12, color: 'var(--text-3)' }}>No logs match your filter.</div>}
      </div>

      <div style={{ marginTop: 12, fontFamily: 'var(--mono)', fontSize: 11, color: 'var(--text-3)', display: 'flex', justifyContent: 'space-between' }}>
        <span>Showing {filtered.length} of {LOGS.length} requests</span>
        <span>Live · updates every 10s</span>
      </div>
    </div>
  );
}

// ─── App ─────────────────────────────────────────────────────────────────────
function App() {
  const [page, setPage] = useState('overview');

  const navItems = [

  ];

  const handleNav = (id) => {
    if (id === 'playground') { window.location.href = 'playground.html'; return; }

  return (

      {/* Main */}

        <div style={S.content}>

          {page === 'keys' && <ApiKeysPage/>}
          {page === 'logs' && <LogsPage/>}

      </div>

}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
