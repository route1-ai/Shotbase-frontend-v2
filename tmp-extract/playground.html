<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shotbase — Playground</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  :root {
    --bg: #050505; --bg-1: #0a0a0a; --bg-2: #111; --bg-3: #1a1a1a;
    --border: rgba(255,255,255,0.07); --text: #f0f0f0; --text-2: #888; --text-3: #444;
    --green: #00e87b; --green-dim: rgba(0,232,123,0.1); --green-glow: rgba(0,232,123,0.35);
    --mono: 'IBM Plex Mono', monospace; --sans: 'Inter', sans-serif;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body { background: var(--bg); color: var(--text); font-family: var(--sans); font-size: 14px; -webkit-font-smoothing: antialiased; display: flex; flex-direction: column; }
  body::before { content: ''; position: fixed; inset: 0; background-image: linear-gradient(rgba(255,255,255,0.012) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.012) 1px, transparent 1px); background-size: 60px 60px; pointer-events: none; z-index: 0; }
  #root { flex: 1; display: flex; flex-direction: column; position: relative; z-index: 1; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

const PRESETS = [
  { label: 'Stripe', url: 'https://stripe.com' },
  { label: 'Vercel', url: 'https://vercel.com' },
  { label: 'Linear', url: 'https://linear.app' },
  { label: 'GitHub', url: 'https://github.com' },
  { label: 'HN', url: 'https://news.ycombinator.com' },
];

const DEMO_IMGS = {
  'https://stripe.com': 'https://placehold.co/1440x900/0a192f/00e87b?text=stripe.com+%E2%80%94+captured',
  'https://vercel.com': 'https://placehold.co/1440x900/000/fff?text=vercel.com+%E2%80%94+captured',
  'https://linear.app': 'https://placehold.co/1440x900/1a1a2e/5e6ad2?text=linear.app+%E2%80%94+captured',
  'https://github.com': 'https://placehold.co/1440x900/0d1117/58a6ff?text=github.com+%E2%80%94+captured',
  'https://news.ycombinator.com': 'https://placehold.co/1440x900/f6f6ef/ff6600?text=news.ycombinator.com+%E2%80%94+captured',
};

function Toggle({ value, onChange, label, sub }) {
  return (
    <div style={{ display: 'flex', alignItems: 'flex-start', justifyContent: 'space-between', padding: '12px 0', borderBottom: '1px solid var(--border)' }}>
      <div>
        <div style={{ fontSize: 13, fontWeight: 500, marginBottom: 2 }}>{label}</div>
        {sub && <div style={{ fontSize: 11, color: 'var(--text-3)', fontFamily: 'var(--mono)' }}>{sub}</div>}
      </div>
      <button onClick={() => onChange(!value)} style={{ width: 40, height: 22, borderRadius: 11, background: value ? 'var(--green)' : 'var(--bg-3)', border: 'none', cursor: 'pointer', position: 'relative', transition: 'background 0.2s', flexShrink: 0, marginTop: 2 }}>
        <div style={{ width: 16, height: 16, borderRadius: 8, background: '#fff', position: 'absolute', top: 3, left: value ? 21 : 3, transition: 'left 0.2s', boxShadow: '0 1px 3px rgba(0,0,0,0.4)' }}/>
      </button>
    </div>
  );
}

function Select({ value, onChange, options, label }) {
  return (
    <div style={{ marginBottom: 16 }}>
      <div style={{ fontFamily: 'var(--mono)', fontSize: 11, color: 'var(--text-3)', textTransform: 'uppercase', letterSpacing: '0.08em', marginBottom: 8 }}>{label}</div>
      <div style={{ display: 'flex', gap: 6, flexWrap: 'wrap' }}>
        {options.map(o => (
          <button key={o.value} onClick={() => onChange(o.value)} style={{ fontFamily: 'var(--mono)', fontSize: 11, padding: '6px 12px', background: value === o.value ? 'var(--green-dim)' : 'var(--bg-2)', border: `1px solid ${value === o.value ? 'rgba(0,232,123,0.25)' : 'var(--border)'}`, borderRadius: 6, color: value === o.value ? 'var(--green)' : 'var(--text-2)', cursor: 'pointer', transition: 'all 0.15s' }}>{o.label}</button>
        ))}
      </div>
    </div>
  );
}

function generateCode(lang, config) {
  const { url, width, height, format, removePopups, fullPage, waitFor, delay } = config;
  if (lang === 'curl') {
    return `curl -X POST \\
  -H "Authorization: Bearer sk-live-..." \\
  -H "Content-Type: application/json" \\
  -d '{
    "url": "${url}",
    "width": ${width},
    "height": ${height || 'null'},
    "format": "${format}",
    "remove_popups": ${removePopups},
    "full_page": ${fullPage},
    "wait_for": "${waitFor}",
    "delay_ms": ${delay}
  }' \\
  https://api.shotbase.io/v1/screenshot`;
  }
  if (lang === 'js') {
    return `import { Shotbase } from '@shotbase/sdk';

const sb = new Shotbase({ apiKey: 'sk-live-...' });

const { url: screenshotUrl, tookMs } = await sb.screenshot({
  url: '${url}',
  width: ${width},
  format: '${format}',
  removePopups: ${removePopups},
  fullPage: ${fullPage},
  waitFor: '${waitFor}',
  delayMs: ${delay},
});

console.log(\`Captured in \${tookMs}ms: \${screenshotUrl}\`);`;
  }
  return `from shotbase import Shotbase

sb = Shotbase(api_key="sk-live-...")

result = sb.screenshot(
    url="${url}",
    width=${width},
    format="${format}",
    remove_popups=${removePopups ? 'True' : 'False'},
    full_page=${fullPage ? 'True' : 'False'},
    wait_for="${waitFor}",
    delay_ms=${delay},
)

print(f"Captured in {result.took_ms}ms: {result.url}")`;
}

function App() {
  const [url, setUrl] = useState('https://stripe.com');
  const [width, setWidth] = useState(1440);
  const [height, setHeight] = useState('');
  const [format, setFormat] = useState('png');
  const [removePopups, setRemovePopups] = useState(true);
  const [fullPage, setFullPage] = useState(false);
  const [waitFor, setWaitFor] = useState('networkidle');
  const [delay, setDelay] = useState(0);
  const [codeLang, setCodeLang] = useState('curl');
  const [loading, setLoading] = useState(false);
  const [result, setResult] = useState(null);
  const [error, setError] = useState(null);
  const [hasRun, setHasRun] = useState(false);

  const config = { url, width, height, format, removePopups, fullPage, waitFor, delay };

  const run = () => {
    setLoading(true);
    setError(null);
    setResult(null);
    setHasRun(true);
    setTimeout(() => {
      setLoading(false);
      setResult({
        screenshotUrl: DEMO_IMGS[url] || `https://placehold.co/${width}x${height || 900}/111/00e87b?text=${encodeURIComponent(url)}`,
        tookMs: Math.floor(100 + Math.random() * 900),
        cached: Math.random() > 0.6,
        width: parseInt(width),
        height: parseInt(height) || 900,
        size: Math.floor(120 + Math.random() * 600),
        popupsRemoved: removePopups ? Math.floor(Math.random() * 3) : 0,
      });
    }, 1200 + Math.random() * 800);
  };

  const code = generateCode(codeLang, config);

  return (
    <React.Fragment>
      {/* Nav */}
      <nav style={{ height: 56, borderBottom: '1px solid var(--border)', display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '0 28px', flexShrink: 0, background: 'rgba(5,5,5,0.85)', backdropFilter: 'blur(20px)' }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 16 }}>
          <a href="index.html" style={{ display: 'flex', alignItems: 'center', gap: 8, textDecoration: 'none' }}>
            <div style={{ width: 26, height: 26, background: 'var(--green)', borderRadius: 6, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
              <svg width="13" height="13" viewBox="0 0 16 16" fill="none"><rect x="1" y="1" width="14" height="10" rx="2" stroke="#000" strokeWidth="1.5"/><path d="M4 14h8M8 11v3" stroke="#000" strokeWidth="1.5" strokeLinecap="round"/></svg>
            </div>
            <span style={{ fontFamily: 'var(--mono)', fontWeight: 600, fontSize: 14, color: 'var(--text)' }}>shotbase</span>
          </a>
          <span style={{ color: 'var(--text-3)', fontSize: 14 }}>/</span>
          <span style={{ fontFamily: 'var(--mono)', fontSize: 13, color: 'var(--text-2)' }}>Playground</span>
        </div>
        <div style={{ display: 'flex', gap: 10 }}>
          <a href="docs.html" style={{ fontFamily: 'var(--mono)', fontSize: 12, color: 'var(--text-2)', background: 'none', border: '1px solid var(--border)', padding: '6px 12px', borderRadius: 6, textDecoration: 'none' }}>Docs</a>
          <a href="dashboard.html" style={{ fontFamily: 'var(--mono)', fontSize: 12, fontWeight: 600, color: '#000', background: 'var(--green)', padding: '6px 14px', borderRadius: 6, textDecoration: 'none' }}>Dashboard →</a>
        </div>
      </nav>

      {/* Split panels */}
      <div style={{ flex: 1, display: 'grid', gridTemplateColumns: '360px 1fr', minHeight: 0 }}>
        {/* LEFT: Controls */}
        <div style={{ borderRight: '1px solid var(--border)', display: 'flex', flexDirection: 'column', overflow: 'auto', background: 'var(--bg-1)' }}>
          <div style={{ padding: '20px 20px 0', borderBottom: '1px solid var(--border)', paddingBottom: 16 }}>
            <div style={{ fontFamily: 'var(--mono)', fontSize: 11, color: 'var(--text-3)', textTransform: 'uppercase', letterSpacing: '0.1em', marginBottom: 10 }}>Target URL</div>
            <div style={{ display: 'flex', gap: 8, marginBottom: 10 }}>
              <input value={url} onChange={e => setUrl(e.target.value)} onKeyDown={e => e.key === 'Enter' && run()}
                style={{ flex: 1, fontFamily: 'var(--mono)', fontSize: 12, background: 'var(--bg-2)', border: '1px solid var(--border)', borderRadius: 7, padding: '9px 12px', color: 'var(--text)', outline: 'none' }}
                placeholder="https://..."/>
            </div>
            <div style={{ display: 'flex', gap: 6, flexWrap: 'wrap' }}>
              {PRESETS.map(p => (
                <button key={p.label} onClick={() => setUrl(p.url)} style={{ fontFamily: 'var(--mono)', fontSize: 10, padding: '4px 9px', background: url === p.url ? 'var(--green-dim)' : 'var(--bg-2)', border: `1px solid ${url === p.url ? 'rgba(0,232,123,0.2)' : 'var(--border)'}`, borderRadius: 5, color: url === p.url ? 'var(--green)' : 'var(--text-3)', cursor: 'pointer' }}>{p.label}</button>
              ))}
            </div>
          </div>

          <div style={{ padding: 20, flex: 1 }}>
            <Select label="Format" value={format} onChange={setFormat} options={[{label:'PNG',value:'png'},{label:'JPEG',value:'jpeg'},{label:'WebP',value:'webp'},{label:'PDF',value:'pdf'}]}/>

            <div style={{ marginBottom: 16 }}>
              <div style={{ fontFamily: 'var(--mono)', fontSize: 11, color: 'var(--text-3)', textTransform: 'uppercase', letterSpacing: '0.08em', marginBottom: 8 }}>Viewport</div>
              <div style={{ display: 'flex', gap: 8 }}>
                <div style={{ flex: 1 }}>
                  <div style={{ fontFamily: 'var(--mono)', fontSize: 10, color: 'var(--text-3)', marginBottom: 4 }}>Width</div>
                  <input type="number" value={width} onChange={e => setWidth(e.target.value)} style={{ width: '100%', fontFamily: 'var(--mono)', fontSize: 12, background: 'var(--bg-2)', border: '1px solid var(--border)', borderRadius: 7, padding: '8px 10px', color: 'var(--text)', outline: 'none' }}/>
                </div>
                <div style={{ flex: 1 }}>
                  <div style={{ fontFamily: 'var(--mono)', fontSize: 10, color: 'var(--text-3)', marginBottom: 4 }}>Height (auto)</div>
                  <input type="number" value={height} onChange={e => setHeight(e.target.value)} placeholder="auto" style={{ width: '100%', fontFamily: 'var(--mono)', fontSize: 12, background: 'var(--bg-2)', border: '1px solid var(--border)', borderRadius: 7, padding: '8px 10px', color: 'var(--text)', outline: 'none' }}/>
                </div>
              </div>
            </div>

            <Select label="Wait for" value={waitFor} onChange={setWaitFor} options={[{label:'networkidle',value:'networkidle'},{label:'domloaded',value:'domloaded'},{label:'load',value:'load'}]}/>

            <div style={{ marginBottom: 16 }}>
              <div style={{ fontFamily: 'var(--mono)', fontSize: 11, color: 'var(--text-3)', textTransform: 'uppercase', letterSpacing: '0.08em', marginBottom: 8 }}>Delay (ms)</div>
              <input type="number" value={delay} onChange={e => setDelay(e.target.value)} style={{ width: '100%', fontFamily: 'var(--mono)', fontSize: 12, background: 'var(--bg-2)', border: '1px solid var(--border)', borderRadius: 7, padding: '8px 10px', color: 'var(--text)', outline: 'none' }}/>
            </div>

            <Toggle label="Remove popups" sub="AI popup removal" value={removePopups} onChange={setRemovePopups}/>
            <Toggle label="Full page" sub="Capture entire scrollable height" value={fullPage} onChange={setFullPage}/>
          </div>

          <div style={{ padding: 20, borderTop: '1px solid var(--border)' }}>
            <button onClick={run} disabled={loading} style={{ width: '100%', fontFamily: 'var(--mono)', fontSize: 13, fontWeight: 600, color: '#000', background: loading ? '#009950' : 'var(--green)', border: 'none', padding: '13px', borderRadius: 8, cursor: loading ? 'not-allowed' : 'pointer', transition: 'all 0.15s', display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 8 }}>
              {loading ? (
                <React.Fragment>
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#000" strokeWidth="2.5" strokeLinecap="round" style={{ animation: 'spin 0.8s linear infinite' }}><path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4"/></svg>
                  Capturing…
                </React.Fragment>
              ) : '▶ Run screenshot'}
            </button>
            <style>{`@keyframes spin { to { transform: rotate(360deg); } }`}</style>
          </div>
        </div>

        {/* RIGHT: Preview + Code */}
        <div style={{ display: 'flex', flexDirection: 'column', minHeight: 0 }}>
          {/* Preview */}
          <div style={{ flex: 1, display: 'flex', alignItems: 'center', justifyContent: 'center', background: 'var(--bg)', borderBottom: '1px solid var(--border)', position: 'relative', minHeight: 0, overflow: 'hidden', padding: 24 }}>
            {!hasRun && (
              <div style={{ textAlign: 'center' }}>
                <div style={{ width: 64, height: 64, borderRadius: 16, background: 'var(--bg-2)', border: '1px solid var(--border)', display: 'flex', alignItems: 'center', justifyContent: 'center', margin: '0 auto 16px' }}>
                  <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="var(--text-3)" strokeWidth="1.5"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>
                </div>
                <div style={{ fontFamily: 'var(--mono)', fontSize: 13, color: 'var(--text-3)', marginBottom: 6 }}>No screenshot yet</div>
                <div style={{ fontFamily: 'var(--mono)', fontSize: 11, color: 'var(--text-3)' }}>Configure options and press Run</div>
              </div>
            )}
            {loading && (
              <div style={{ textAlign: 'center' }}>
                <div style={{ width: 48, height: 48, border: '2px solid var(--border)', borderTopColor: 'var(--green)', borderRadius: 24, animation: 'spin 0.8s linear infinite', margin: '0 auto 16px' }}/>
                <div style={{ fontFamily: 'var(--mono)', fontSize: 13, color: 'var(--text-2)' }}>Capturing screenshot…</div>
                <div style={{ fontFamily: 'var(--mono)', fontSize: 11, color: 'var(--text-3)', marginTop: 4 }}>Loading page, waiting for {waitFor}</div>
              </div>
            )}
            {result && !loading && (
              <React.Fragment>
                <img src={result.screenshotUrl} alt="Screenshot" style={{ maxWidth: '100%', maxHeight: '100%', objectFit: 'contain', borderRadius: 8, border: '1px solid var(--border)', boxShadow: '0 20px 60px rgba(0,0,0,0.5)' }}/>
                {/* Result meta */}
                <div style={{ position: 'absolute', top: 12, right: 12, display: 'flex', gap: 6 }}>
                  <span style={{ fontFamily: 'var(--mono)', fontSize: 11, background: 'var(--green-dim)', border: '1px solid rgba(0,232,123,0.2)', color: 'var(--green)', padding: '4px 10px', borderRadius: 6 }}>200 OK</span>
                  <span style={{ fontFamily: 'var(--mono)', fontSize: 11, background: 'var(--bg-2)', border: '1px solid var(--border)', color: 'var(--text-2)', padding: '4px 10px', borderRadius: 6 }}>{result.tookMs}ms</span>
                  {result.cached && <span style={{ fontFamily: 'var(--mono)', fontSize: 11, background: 'var(--bg-2)', border: '1px solid var(--border)', color: 'var(--text-2)', padding: '4px 10px', borderRadius: 6 }}>cached</span>}
                  {result.popupsRemoved > 0 && <span style={{ fontFamily: 'var(--mono)', fontSize: 11, background: 'var(--bg-2)', border: '1px solid var(--border)', color: 'var(--text-2)', padding: '4px 10px', borderRadius: 6 }}>{result.popupsRemoved} popup{result.popupsRemoved > 1 ? 's' : ''} removed</span>}
                </div>
                <div style={{ position: 'absolute', bottom: 12, left: 12, fontFamily: 'var(--mono)', fontSize: 10, color: 'var(--text-3)' }}>{result.width}×{result.height} · {result.size} KB · {format.toUpperCase()}</div>
              </React.Fragment>
            )}
          </div>

          {/* Code panel */}
          <div style={{ flexShrink: 0, borderTop: '1px solid var(--border)', background: 'var(--bg-1)' }}>
            <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', borderBottom: '1px solid var(--border)', padding: '0 16px' }}>
              <div style={{ display: 'flex' }}>
                {['curl','js','python'].map(l => (
                  <button key={l} onClick={() => setCodeLang(l)} style={{ fontFamily: 'var(--mono)', fontSize: 12, padding: '11px 16px', background: 'none', border: 'none', borderBottom: `2px solid ${codeLang === l ? 'var(--green)' : 'transparent'}`, color: codeLang === l ? 'var(--green)' : 'var(--text-3)', cursor: 'pointer', marginBottom: -1 }}>{l === 'js' ? 'JavaScript' : l === 'python' ? 'Python' : 'cURL'}</button>
                ))}
              </div>
              <button onClick={() => navigator.clipboard?.writeText(code)} style={{ fontFamily: 'var(--mono)', fontSize: 11, color: 'var(--text-3)', background: 'none', border: 'none', cursor: 'pointer', padding: '6px 8px' }}>Copy</button>
            </div>
            <pre style={{ fontFamily: 'var(--mono)', fontSize: 12, lineHeight: 1.7, padding: '16px', overflow: 'auto', maxHeight: 200, color: 'var(--text-2)', whiteSpace: 'pre-wrap', wordBreak: 'break-all' }}>{code}</pre>
          </div>
        </div>
      </div>
    </React.Fragment>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
